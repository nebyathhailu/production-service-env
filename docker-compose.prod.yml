# Production deployment stack - pulls pre-built, commit-tagged images from
# Docker Hub instead of building locally (see docker-compose.yml for the dev
# build-from-source version). Driven by scripts/deploy.sh.
#
# Required environment variables (see .env.example): DOCKERHUB_USERNAME,
# APP_NAME, IMAGE_TAG. IMAGE_TAG must be a commit-pinned tag (sha-<hash>),
# never "latest".

services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"   # the only published host port - the sole public entry point
    volumes:
      - ./nginx/docker-compose.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      ride-api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - frontend

  ride-api:
    image: ${DOCKERHUB_USERNAME}/${APP_NAME}-ride-api:${IMAGE_TAG}
    environment:
      BIND_HOST: "0.0.0.0"
      RIDE_API_PORT: "3001"
      MATCHING_SERVICE_URL: "http://matching-service:3002"
      DOWNSTREAM_TIMEOUT: "5"
    depends_on:
      matching-service:
        condition: service_healthy
      dispatch-service:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - frontend
      - backend
    # No "ports:" - reachable on the Compose network (by Nginx) but not
    # published to the host.

  matching-service:
    image: ${DOCKERHUB_USERNAME}/${APP_NAME}-matching-service:${IMAGE_TAG}
    environment:
      BIND_HOST: "0.0.0.0"
      MATCHING_SERVICE_PORT: "3002"
      DISPATCH_SERVICE_URL: "http://dispatch-service:3003"
      DOWNSTREAM_TIMEOUT: "5"
    restart: unless-stopped
    networks:
      - backend
    # No "ports:" - internal-only.

  dispatch-service:
    image: ${DOCKERHUB_USERNAME}/${APP_NAME}-dispatch-service:${IMAGE_TAG}
    environment:
      BIND_HOST: "0.0.0.0"
      DISPATCH_SERVICE_PORT: "3003"
      RIDE_API_URL: "http://ride-api:3001"
      DOWNSTREAM_TIMEOUT: "5"
    restart: unless-stopped
    networks:
      - backend
    # No "ports:" - internal-only.

networks:
  frontend:
  backend:
    internal: true
