# Production deployment stack - pulls pre-built, commit-tagged images from
# Docker Hub instead of building locally (see docker-compose.yml for the dev
# build-from-source version). Driven by scripts/deploy.sh.
#
# Required environment variables (see .env.example): DOCKERHUB_USERNAME,
# APP_NAME, IMAGE_TAG. IMAGE_TAG must be a commit-pinned tag (sha-<hash>),
# never "latest".
#
# Service keys are the expense-domain names; the published image names keep the
# original -service-a/-b/-c suffixes (the CI build matrix publishes by code dir).

services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"   # the only published host port - the sole public entry point
    volumes:
      - ./nginx/docker-compose.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      expense-api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - frontend

  expense-api:
    image: ${DOCKERHUB_USERNAME}/${APP_NAME}-service-a:${IMAGE_TAG}
    environment:
      BIND_HOST: "0.0.0.0"
      EXPENSE_API_PORT: "3001"
      POLICY_SERVICE_URL: "http://policy-service:3002"
      DOWNSTREAM_TIMEOUT: "5"
    depends_on:
      policy-service:
        condition: service_healthy
      approval-service:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - frontend
      - backend
    # No "ports:" - reachable on the Compose network (by Nginx) but not
    # published to the host.

  policy-service:
    image: ${DOCKERHUB_USERNAME}/${APP_NAME}-service-b:${IMAGE_TAG}
    environment:
      BIND_HOST: "0.0.0.0"
      POLICY_SERVICE_PORT: "3002"
      APPROVAL_SERVICE_URL: "http://approval-service:3003"
      POLICY_MAX_AMOUNT: "500"
      DOWNSTREAM_TIMEOUT: "5"
    restart: unless-stopped
    networks:
      - backend
    # No "ports:" - internal-only.

  approval-service:
    image: ${DOCKERHUB_USERNAME}/${APP_NAME}-service-c:${IMAGE_TAG}
    environment:
      BIND_HOST: "0.0.0.0"
      APPROVAL_SERVICE_PORT: "3003"
      EXPENSE_API_URL: "http://expense-api:3001"
      DOWNSTREAM_TIMEOUT: "5"
    restart: unless-stopped
    networks:
      - backend
    # No "ports:" - internal-only.

networks:
  frontend:
  backend:
    internal: true
