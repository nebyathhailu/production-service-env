# Prometheus alert rules. See docs/architecture.md and README "Alerts"
# section for reproduction/verification steps for each of these.
groups:
  - name: service-env-alerts
    rules:
      - alert: ServiceDown
        expr: service_up == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "{{ $labels.service }} is down"
          description: >
            service_up reported 0 for {{ $labels.service }} for at least 30s.
            Reproduce: docker compose stop <service>.
            First check: docker compose ps, docker compose logs <service>.

      - alert: HighErrorRate
        expr: sum by (service) (rate(http_errors_total[2m])) > 0.1
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "High error rate on {{ $labels.service }}"
          description: >
            More than 0.1 errors/sec (sustained) on {{ $labels.service }}.
            Reproduce: hit the service's /fail (or /dependency-fail) endpoint
            repeatedly, e.g. via scripts/load-test.js failure scenario.
            First check: docker compose logs <service> for request_failed
            events; confirm downstream dependency health.

      - alert: HighLatency
        expr: >
          histogram_quantile(0.95,
            sum by (le, service) (rate(http_request_duration_seconds_bucket[5m]))
          ) > 0.5
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "p95 latency above 500ms on {{ $labels.service }}"
          description: >
            p95 request duration for {{ $labels.service }} exceeded 500ms over
            a 5m window. Reproduce: hit the service's /slow endpoint, or run
            scripts/load-test.js stress scenario.
            First check: Jaeger trace for the slow span; Grafana p95 panel.
