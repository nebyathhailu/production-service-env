# Nginx reverse proxy for the Docker Compose version of this stack.
#
# This is the containerized counterpart to nginx/service-env.conf (the VM
# version). The routing/security/tracing logic is identical; only the two
# things that change with the runtime are different:
#   1. Service discovery: Compose's built-in DNS resolves plain service
#      names ("ride-api") directly - no /etc/hosts script needed here.
#   2. Logs: written to /dev/stdout and /dev/stderr instead of files, so
#      `docker compose logs nginx` shows them (per the assignment's
#      "logs should go to stdout/stderr" rule) instead of journald/files.
#
# Mounted directly over /etc/nginx/conf.d/default.conf in the official nginx
# image (see docker-compose.yml) - this *replaces* the image's own default
# site rather than sitting alongside it, so there's no "default site shadows
# ours" conflict like we hit on the VM.

upstream ride_api_backend {
    server ride-api:3001;
}

map $http_x_request_id $req_id {
    default $http_x_request_id;
    ""      $request_id;
}

log_format service_env_json escape=json
    '{'
    '"timestamp":"$time_iso8601",'
    '"request_id":"$req_id",'
    '"method":"$request_method",'
    '"path":"$request_uri",'
    '"status":$status,'
    '"upstream":"$upstream_label",'
    '"request_time":$request_time'
    '}';

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    server_tokens off;

    set $upstream_label "none";

    access_log /dev/stdout service_env_json;
    error_log  /dev/stderr warn;

    location = /ride-api {
        return 301 /ride-api/;
    }

    # Keep the internal /metrics endpoint off the public route. Prometheus
    # scrapes ride-api:3001/metrics directly on the Compose network, so this
    # has no effect on scraping - it only stops metrics being readable from
    # outside via the gateway. Exact match wins over the /ride-api/ prefix.
    location = /ride-api/metrics {
        default_type application/json;
        return 404 '{"error":"not_found"}';
    }

    location /ride-api/ {
        set $upstream_label "ride-api:3001";

        proxy_pass http://ride_api_backend/;

        proxy_set_header X-Request-ID $req_id;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # ride-api echoes X-Request-ID back too; strip its copy so Nginx's
        # own add_header below is the single source of truth on the response
        # the client actually sees, on every outcome (200, 404, 502, ...).
        proxy_hide_header X-Request-ID;
        add_header X-Request-ID $req_id always;
    }

    # matching-service and dispatch-service are never given a location block,
    # so there is no path by which Nginx can forward traffic to them. In
    # Compose, the actual isolation comes from them having no "ports:" entry
    # in docker-compose.yml - this only proves Nginx itself won't proxy to them.
    location / {
        default_type application/json;
        return 404 '{"error":"not_found"}';
    }
}
