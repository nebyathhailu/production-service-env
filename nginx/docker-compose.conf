# Nginx reverse proxy for the Docker Compose version of this stack.
#
# The public entry point is the expense-api. Only /api/* (and the legacy
# /service-a/* alias) are proxied; policy-service and approval-service are never
# given a location block. Compose DNS resolves the "expense-api" service name.
# Logs go to /dev/stdout|stderr so `docker compose logs nginx` shows them.

upstream expense_api_backend {
    server expense-api:3001;
}

map $http_x_request_id $req_id {
    default $http_x_request_id;
    ""      $request_id;
}

log_format service_env_json escape=json
    '{'
    '"timestamp":"$time_iso8601",'
    '"request_id":"$req_id",'
    '"method":"$request_method",'
    '"path":"$request_uri",'
    '"status":$status,'
    '"upstream":"$upstream_label",'
    '"request_time":$request_time'
    '}';

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    server_tokens off;

    set $upstream_label "none";

    access_log /dev/stdout service_env_json;
    error_log  /dev/stderr warn;

    location = /api {
        return 301 /api/;
    }
    location = /service-a {
        return 301 /service-a/;
    }

    # Keep the internal /metrics endpoint off the public route. Prometheus scrapes
    # expense-api:3001/metrics directly on the Compose network, so this has no
    # effect on scraping - it only stops metrics being read via the gateway.
    location = /api/metrics {
        default_type application/json;
        return 404 '{"error":"not_found"}';
    }
    location = /service-a/metrics {
        default_type application/json;
        return 404 '{"error":"not_found"}';
    }

    # Public API prefix.
    location /api/ {
        set $upstream_label "expense-api:3001";
        proxy_pass http://expense_api_backend/;

        proxy_set_header X-Request-ID $req_id;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_hide_header X-Request-ID;
        add_header X-Request-ID $req_id always;
    }

    # Legacy alias - same backend, kept so older scripts/docs using /service-a/*
    # continue to work after the expense-domain rename.
    location /service-a/ {
        set $upstream_label "expense-api:3001";
        proxy_pass http://expense_api_backend/;

        proxy_set_header X-Request-ID $req_id;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_hide_header X-Request-ID;
        add_header X-Request-ID $req_id always;
    }

    # policy-service and approval-service are never given a location block, so
    # Nginx has no path to them. Actual isolation comes from them having no
    # "ports:" entry in docker-compose.yml.
    location / {
        default_type application/json;
        return 404 '{"error":"not_found"}';
    }
}
