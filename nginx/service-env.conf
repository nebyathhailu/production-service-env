# Nginx reverse proxy for the production-service-env stack.
#
# Deploy by copying/symlinking this file to /etc/nginx/conf.d/service-env.conf
# (or /etc/nginx/sites-available/ + sites-enabled/ symlink), then:
#   sudo nginx -t && sudo systemctl reload nginx
#
# Public entry point:  http://<vm-ip>/ride-api/...  -> ride-api (127.0.0.1:3001)
# matching-service and dispatch-service are NOT proxied here on purpose - they
# are internal-only and must stay unreachable from outside the box (enforced
# by firewall / bind-address on those services, not by this file).

# ---------------------------------------------------------------------------
# Service discovery: services are addressed by name (ride-api.internal),
# never by hardcoded IP. Name -> 127.0.0.1 resolution is provided by
# /etc/hosts entries on this VM (see README "Service Discovery" section).
# Nginx resolves this name once at startup/reload via the system resolver.
# ---------------------------------------------------------------------------
upstream ride_api_backend {
    server ride-api.internal:3001;
}

# Use the client-supplied X-Request-ID when present, otherwise fall back to
# nginx's built-in $request_id (random hex, generated per request).
map $http_x_request_id $req_id {
    default $http_x_request_id;
    ""      $request_id;
}

# Structured JSON access log, matching the Service API & Logging Contract.
log_format service_env_json escape=json
    '{'
    '"timestamp":"$time_iso8601",'
    '"request_id":"$req_id",'
    '"method":"$request_method",'
    '"path":"$request_uri",'
    '"status":$status,'
    '"upstream":"$upstream_label",'
    '"request_time":$request_time'
    '}';

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    server_tokens off;

    # Default label for any request that never reaches a proxied location
    # (redirects, 404s). Overridden inside /ride-api/ only.
    set $upstream_label "none";

    access_log /var/log/nginx/service-env-access.log service_env_json;
    error_log  /var/log/nginx/service-env-error.log warn;

    # Redirect /ride-api -> /ride-api/ so prefix stripping below always applies.
    location = /ride-api {
        return 301 /ride-api/;
    }

    # Only ride-api is reachable through the proxy.
    location /ride-api/ {
        set $upstream_label "ride-api:3001";

        proxy_pass http://ride_api_backend/;

        proxy_set_header X-Request-ID $req_id;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        add_header X-Request-ID $req_id always;
    }

    # Everything else (including any attempt to reach matching-service/
    # dispatch-service through the proxy) falls through to here and is
    # rejected. matching-service and dispatch-service are never given a
    # location block, so there is no path by which Nginx can forward
    # traffic to them.
    #
    # Note: this only proves Nginx won't proxy to them. It says nothing about
    # whether they are reachable by hitting their ports directly - that's
    # enforced by bind-address/firewall on the VM, not by this file. See the
    # README's Network Security section for the actual verification.
    location / {
        default_type application/json;
        return 404 '{"error":"not_found"}';
    }
}
