# Nginx reverse proxy for the production-service-env stack.
#
# Deploy by copying/symlinking this file to /etc/nginx/conf.d/service-env.conf
# (or /etc/nginx/sites-available/ + sites-enabled/ symlink), then:
#   sudo nginx -t && sudo systemctl reload nginx
#
# Public entry point:  http://<vm-ip>/service-a/...  -> Service A (127.0.0.1:3001)
# Service B and C are NOT proxied here on purpose - they are internal-only
# and must stay unreachable from outside the box (enforced by firewall /
# bind-address on those services, not by this file).

# ---------------------------------------------------------------------------
# Service discovery: services are addressed by name (service-a.internal),
# never by hardcoded IP. Name -> 127.0.0.1 resolution is provided by
# /etc/hosts entries on this VM (see README "Service Discovery" section).
# Nginx resolves this name once at startup/reload via the system resolver.
# ---------------------------------------------------------------------------
upstream service_a_backend {
    server service-a.internal:3001;
}

# Use the client-supplied X-Request-ID when present, otherwise fall back to
# nginx's built-in $request_id (random hex, generated per request).
map $http_x_request_id $req_id {
    default $http_x_request_id;
    ""      $request_id;
}

# Structured JSON access log, matching the Service API & Logging Contract.
log_format service_env_json escape=json
    '{'
    '"timestamp":"$time_iso8601",'
    '"request_id":"$req_id",'
    '"method":"$request_method",'
    '"path":"$request_uri",'
    '"status":$status,'
    '"upstream":"$upstream_label",'
    '"request_time":$request_time'
    '}';

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    server_tokens off;

    access_log /var/log/nginx/service-env-access.log service_env_json;
    error_log  /var/log/nginx/service-env-error.log warn;

    # Redirect /service-a -> /service-a/ so prefix stripping below always applies.
    location = /service-a {
        return 301 /service-a/;
    }

    # Only Service A is reachable through the proxy.
    location /service-a/ {
        set $upstream_label "service-a:3001";

        proxy_pass http://service_a_backend/;

        proxy_set_header X-Request-ID $req_id;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        add_header X-Request-ID $req_id always;
    }

    # Everything else (including any attempt to reach service-b/service-c
    # through the proxy) falls through to here and is rejected. Service B
    # and C are never given a location block,ask  so there is no path by which
    # Nginx can forward traffic to them.
    location / {
        set $upstream_label "none";
        default_type application/json;
        return 404 '{"error":"not_found","path":"$request_uri"}';
    }
}
