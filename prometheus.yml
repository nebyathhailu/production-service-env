# Prometheus scrape + rule configuration.
# Services are addressed by Docker Compose service name (not localhost), on the
# same app network. Each service exposes Prometheus metrics at /metrics on its
# app port. The job_name becomes the `job` label used by the ServiceDown alert.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert-rules.yml

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "expense-api"
    static_configs:
      - targets: ["expense-api:3001"]

  - job_name: "policy-service"
    static_configs:
      - targets: ["policy-service:3002"]

  - job_name: "approval-service"
    static_configs:
      - targets: ["approval-service:3003"]
