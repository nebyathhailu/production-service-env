name: Container CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify code and build containers
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - service: service-a
            path: ./services/service-a
          - service: service-b
            path: ./services/service-b
          - service: service-c
            path: ./services/service-c

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        working-directory: ${{ matrix.path }}
        run: pytest -v

      - name: Build Docker image locally
        run: |
          docker build \
            -t ${{ matrix.service }}:${{ github.sha }} \
            -f ${{ matrix.path }}/Dockerfile \
            .

  verify-compose:
    name: Verify Docker Compose stack
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Compose file
        run: docker compose config

      - name: Build Compose stack
        run: docker compose build --pull

      - name: Start Compose stack
        run: docker compose up -d --wait

      - name: Show running services
        run: docker compose ps

      - name: Check gateway health
        # --retry-connrefused covers the brief window where nginx is "running"
        # (so --wait returns) but its worker hasn't bound :80 yet. nginx has no
        # healthcheck for --wait to gate on, so retry here instead of a fixed sleep.
        run: curl --fail --retry 5 --retry-connrefused --retry-delay 1 http://localhost:8080/service-a/health

      - name: Stop Compose stack
        if: always()
        run: docker compose down -v

  publish:
    name: Publish Docker images
    runs-on: ubuntu-latest
    needs: verify-compose
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    strategy:
      matrix:
        include:
          - service: service-a
            path: ./services/service-a
          - service: service-b
            path: ./services/service-b
          - service: service-c
            path: ./services/service-c

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set short commit hash
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.path }}/Dockerfile
          push: true
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}-${{ matrix.service }}:sha-${{ env.SHORT_SHA }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Write deployment summary
        run: |
          echo "### Published Image" >> "$GITHUB_STEP_SUMMARY"
          echo "Service: ${{ matrix.service }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Image: ${{ vars.DOCKERHUB_USERNAME }}/${{ github.event.repository.name }}-${{ matrix.service }}:sha-${SHORT_SHA}" >> "$GITHUB_STEP_SUMMARY"
