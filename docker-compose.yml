services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"   # the only published host port - the sole public entry point
    volumes:
      - ./nginx/docker-compose.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      service-a:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - appnet

  service-a:
    build:
      context: .
      dockerfile: services/service-a/Dockerfile
    environment:
      SERVICE_A_PORT: "3001"
      BIND_HOST: "0.0.0.0"   # must bind to all interfaces inside the container
                              # so other containers (Nginx) can reach it over
                              # the Compose network - 127.0.0.1 here would only
                              # mean "this container", not "from Nginx".
      SERVICE_B_URL: "http://service-b:3002"
      DOWNSTREAM_TIMEOUT: "5"
    depends_on:
      service-b:
        condition: service_healthy
      service-c:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - appnet
    # No "ports:" - Service A is reachable on the Compose network (by Nginx)
    # but not published to the host. The public route is entirely via Nginx.

  service-b:
    build:
      context: .
      dockerfile: services/service-b/Dockerfile
    environment:
      SERVICE_B_PORT: "3002"
      BIND_HOST: "0.0.0.0"
      SERVICE_C_URL: "http://service-c:3003"
      DOWNSTREAM_TIMEOUT: "5"
    restart: unless-stopped
    networks:
      - appnet
    # No "ports:" - internal-only. Reachable as "service-b:3002" from other
    # containers on appnet, never reachable from the host or outside it.

  service-c:
    build:
      context: .
      dockerfile: services/service-c/Dockerfile
    environment:
      SERVICE_C_PORT: "3003"
      BIND_HOST: "0.0.0.0"
      SERVICE_A_URL: "http://service-a:3001"
      DOWNSTREAM_TIMEOUT: "5"
    restart: unless-stopped
    networks:
      - appnet
    # No "ports:" - internal-only, same reasoning as service-b.

  prometheus:
    image: prom/prometheus:v2.54.1
    # Config mounted at Prometheus' default path, so no custom command is needed.
    # Metrics persist to a named volume (survives container recreation).
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"   # published so a reviewer can open the Prometheus UI/targets
    restart: unless-stopped
    networks:
      - appnet

networks:
  appnet:
    driver: bridge

volumes:
  prometheus-data:
