services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"   # the only published host port - the sole public entry point
    volumes:
      - ./nginx/docker-compose.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      expense-api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - appnet

  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"   # Jaeger UI — open http://localhost:16686 to browse traces
      - "4318:4318"     # OTLP HTTP — services send spans here
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:16686/"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - appnet

  # Public-facing entry point: accepts expense submissions, orchestrates the flow,
  # receives the approval callback. (Built from services/service-a.)
  expense-api:
    build:
      context: .
      dockerfile: services/service-a/Dockerfile
    environment:
      EXPENSE_API_PORT: "3001"
      BIND_HOST: "0.0.0.0"
      POLICY_SERVICE_URL: "http://policy-service:3002"
      DOWNSTREAM_TIMEOUT: "5"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4318"
      OTEL_SERVICE_NAME: "expense-api"
    depends_on:
      jaeger:
        condition: service_healthy
      policy-service:
        condition: service_healthy
      approval-service:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - appnet
    # No "ports:" - reachable on the Compose network (by Nginx) but not published
    # to the host. The public route is entirely via Nginx.

  # Internal: validates an expense against spending policy, forwards to approval.
  # (Built from services/service-b.)
  policy-service:
    build:
      context: .
      dockerfile: services/service-b/Dockerfile
    environment:
      POLICY_SERVICE_PORT: "3002"
      BIND_HOST: "0.0.0.0"
      APPROVAL_SERVICE_URL: "http://approval-service:3003"
      POLICY_MAX_AMOUNT: "500"
      DOWNSTREAM_TIMEOUT: "5"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4318"
      OTEL_SERVICE_NAME: "policy-service"
    depends_on:
      jaeger:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - appnet
    # No "ports:" - internal-only. Reachable as "policy-service:3002" on appnet,
    # never from the host.

  # Internal: approves the expense, records a ledger ref, calls back expense-api.
  # (Built from services/service-c.)
  approval-service:
    build:
      context: .
      dockerfile: services/service-c/Dockerfile
    environment:
      APPROVAL_SERVICE_PORT: "3003"
      BIND_HOST: "0.0.0.0"
      EXPENSE_API_URL: "http://expense-api:3001"
      DOWNSTREAM_TIMEOUT: "5"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4318"
      OTEL_SERVICE_NAME: "approval-service"
    depends_on:
      jaeger:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - appnet
    # No "ports:" - internal-only, same reasoning as policy-service.

  prometheus:
    image: prom/prometheus:v2.54.1
    # Config mounted at Prometheus' default path, so no custom command is needed.
    # Metrics persist to a named volume (survives container recreation).
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"   # published so a reviewer can open the Prometheus UI/targets
    restart: unless-stopped
    networks:
      - appnet

  grafana:
    image: grafana/grafana:11.6.16
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-admin}"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - appnet

networks:
  appnet:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
