services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"   # the only published host port - the sole public entry point
    volumes:
      - ./nginx/docker-compose.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      ride-api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - appnet

  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"   # Jaeger UI — open http://localhost:16686 to browse traces
      - "4318:4318"     # OTLP HTTP — services send spans here
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:16686/"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - appnet

  ride-api:
    build:
      context: .
      dockerfile: services/ride-api/Dockerfile
    environment:
      RIDE_API_PORT: "3001"
      BIND_HOST: "0.0.0.0"
      MATCHING_SERVICE_URL: "http://matching-service:3002"
      DOWNSTREAM_TIMEOUT: "5"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4318"
      OTEL_SERVICE_NAME: "ride-api"
    depends_on:
      jaeger:
        condition: service_healthy
      matching-service:
        condition: service_healthy
      dispatch-service:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - appnet
    # No "ports:" - ride-api is reachable on the Compose network (by Nginx)
    # but not published to the host. The public route is entirely via Nginx.

  matching-service:
    build:
      context: .
      dockerfile: services/matching-service/Dockerfile
    environment:
      MATCHING_SERVICE_PORT: "3002"
      BIND_HOST: "0.0.0.0"
      DISPATCH_SERVICE_URL: "http://dispatch-service:3003"
      DOWNSTREAM_TIMEOUT: "5"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4318"
      OTEL_SERVICE_NAME: "matching-service"
    depends_on:
      jaeger:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - appnet
    # No "ports:" - internal-only. Reachable as "matching-service:3002" from
    # other containers on appnet, never reachable from the host or outside it.

  dispatch-service:
    build:
      context: .
      dockerfile: services/dispatch-service/Dockerfile
    environment:
      DISPATCH_SERVICE_PORT: "3003"
      BIND_HOST: "0.0.0.0"
      RIDE_API_URL: "http://ride-api:3001"
      DOWNSTREAM_TIMEOUT: "5"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4318"
      OTEL_SERVICE_NAME: "dispatch-service"
    depends_on:
      jaeger:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - appnet
    # No "ports:" - internal-only, same reasoning as matching-service.

  prometheus:
    image: prom/prometheus:v2.54.1
    # Config mounted at Prometheus' default path, so no custom command is needed.
    # Metrics persist to a named volume (survives container recreation).
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"   # published so a reviewer can open the Prometheus UI/targets
    restart: unless-stopped
    networks:
      - appnet

  grafana:
    image: grafana/grafana:11.6.16
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-admin}"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - appnet

networks:
  appnet:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
